<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMan - AI 助手控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .container {
            display: flex;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 600;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .new-chat-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background: var(--primary-dark);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-section {
            margin-bottom: 20px;
        }

        .sidebar-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .session-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .session-item:hover {
            background: var(--bg-input);
        }

        .session-item.active {
            background: var(--primary);
        }

        .session-item-icon {
            width: 24px;
            height: 24px;
            background: var(--bg-input);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .session-item.active .session-item-icon {
            background: rgba(255,255,255,0.2);
        }

        .session-item-content {
            flex: 1;
            min-width: 0;
        }

        .session-item-title {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-item-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .session-item.active .session-item-meta {
            color: rgba(255,255,255,0.7);
        }

        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid var(--border);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: var(--danger);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Chat Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
        }

        .chat-title {
            font-size: 16px;
            font-weight: 500;
        }

        .chat-actions {
            display: flex;
            gap: 10px;
        }

        .chat-action-btn {
            padding: 8px 15px;
            background: var(--bg-input);
            color: var(--text-primary);
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-action-btn:hover {
            background: var(--border);
        }

        .chat-action-btn.danger:hover {
            background: var(--danger);
        }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
        }

        .message {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--primary);
        }

        .message.assistant .message-avatar {
            background: var(--success);
        }

        .message.system .message-avatar {
            background: var(--warning);
        }

        .message-content {
            max-width: 70%;
            min-width: 100px;
        }

        .message-bubble {
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
        }

        .message.user .message-bubble {
            background: var(--primary);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: var(--bg-card);
            border-bottom-left-radius: 4px;
        }

        .message.system .message-bubble {
            background: var(--bg-input);
            font-style: italic;
        }

        .message-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            gap: 15px;
        }

        .message.user .message-meta {
            text-align: right;
        }

        /* Loading Animation */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Input Area */
        .input-area {
            padding: 20px 25px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-container {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 15px 20px;
            background: var(--bg-input);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            min-height: 52px;
            max-height: 200px;
        }

        .message-input:focus {
            border-color: var(--primary);
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            padding: 15px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-options {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            align-items: center;
        }

        .provider-select {
            padding: 8px 15px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .provider-select:focus {
            border-color: var(--primary);
        }

        .stream-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-input);
            border-radius: 11px;
            transition: 0.3s;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--primary);
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(18px);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-card);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 25px;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-action-btn {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-action-btn:hover {
            border-color: var(--primary);
            background: var(--bg-input);
        }

        /* Error State */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            color: var(--danger);
        }

        /* Code Block */
        .message-bubble pre {
            background: var(--bg-dark);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message-bubble code {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }

        @keyframes slideIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🤖</div>
                    <span>OpenMan</span>
                </div>
                <button class="new-chat-btn" onclick="createNewSession()">
                    <span>+</span> 新对话
                </button>
            </div>

            <div class="sidebar-content">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">会话列表</div>
                    <div id="sessions-list"></div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="status-bar">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">连接中...</span>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main">
            <div class="chat-header">
                <div class="chat-title" id="chat-title">新对话</div>
                <div class="chat-actions">
                    <button class="chat-action-btn" onclick="exportCurrentSession()">导出</button>
                    <button class="chat-action-btn danger" onclick="clearCurrentSession()">清空</button>
                </div>
            </div>

            <div class="messages-container" id="messages-container">
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h2>欢迎使用 OpenMan</h2>
                    <p>您的 AI 助手，支持多种 AI 服务</p>
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="sendQuickMessage('你好，请介绍一下你自己')">自我介绍</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('帮我写一个 TypeScript 函数')">写代码</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('解释一下什么是机器学习')">知识问答</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-container">
                        <textarea 
                            class="message-input" 
                            id="message-input" 
                            placeholder="输入消息... (Shift+Enter 换行，Enter 发送)"
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                    </div>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()">
                        发送 ➤
                    </button>
                </div>
                <div class="input-options">
                    <select class="provider-select" id="provider-select">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="webai">Web AI</option>
                    </select>
                    <label class="stream-toggle">
                        <div class="toggle-switch">
                            <input type="checkbox" id="stream-toggle" checked>
                            <span class="toggle-slider"></span>
                        </div>
                        <span>流式输出</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global State
        let ws = null;
        let currentSession = null;
        let sessions = [];
        let messages = [];
        let isStreaming = false;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;

        // Configuration
        const API_BASE = window.location.origin;
        const WS_PORT = parseInt(window.location.port || '3000') + 1;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initWebSocket();
            loadSessions();
        });

        // WebSocket Connection
        function initWebSocket() {
            const wsUrl = `ws://${window.location.hostname}:${WS_PORT}`;
            console.log('Connecting to WebSocket:', wsUrl);
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                updateConnectionStatus(true);
                reconnectAttempts = 0;
                showToast('已连接到服务器', 'success');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch (e) {
                    console.error('Failed to parse WebSocket message:', e);
                }
            };

            ws.onclose = (event) => {
                console.log('WebSocket closed:', event.code, event.reason);
                updateConnectionStatus(false);
                
                // Auto reconnect
                if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts++;
                    console.log(`Reconnecting in 3s... (attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`);
                    setTimeout(initWebSocket, 3000);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateConnectionStatus(false);
            };
        }

        function handleWebSocketMessage(data) {
            console.log('WebSocket message:', data.type);
            
            switch (data.type) {
                case 'welcome':
                    console.log('Welcome message received:', data.payload);
                    break;
                    
                case 'chat.token':
                    appendStreamToken(data.payload.token);
                    break;
                    
                case 'chat.complete':
                    completeStream(data.payload.response);
                    break;
                    
                case 'error':
                    showError(data.payload.error);
                    break;
                    
                case 'session.created':
                    sessions.unshift(data.payload.session);
                    renderSessions();
                    selectSession(data.payload.session.id);
                    break;
                    
                default:
                    console.log('Unknown message type:', data.type);
            }
        }

        function updateConnectionStatus(connected) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            
            if (connected) {
                dot.classList.remove('disconnected');
                text.textContent = '已连接';
            } else {
                dot.classList.add('disconnected');
                text.textContent = '未连接';
            }
        }

        // Session Management
        async function loadSessions() {
            try {
                const response = await fetch(`${API_BASE}/api/sessions`);
                if (response.ok) {
                    sessions = await response.json();
                    renderSessions();
                    
                    if (sessions.length > 0) {
                        selectSession(sessions[0].id);
                    }
                }
            } catch (error) {
                console.error('Failed to load sessions:', error);
            }
        }

        async function createNewSession() {
            try {
                const provider = document.getElementById('provider-select').value;
                const response = await fetch(`${API_BASE}/api/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: `对话 ${new Date().toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}`,
                        provider: provider
                    })
                });

                if (response.ok) {
                    const session = await response.json();
                    sessions.unshift(session);
                    renderSessions();
                    selectSession(session.id);
                    showToast('新对话已创建', 'success');
                }
            } catch (error) {
                console.error('Failed to create session:', error);
                showToast('创建失败', 'error');
            }
        }

        function selectSession(sessionId) {
            currentSession = sessions.find(s => s.id === sessionId);
            if (!currentSession) return;
            
            messages = currentSession.messages || [];
            
            // Update UI
            document.getElementById('chat-title').textContent = currentSession.name;
            renderMessages();
            renderSessions();
            
            // Update provider select
            if (currentSession.provider) {
                document.getElementById('provider-select').value = currentSession.provider;
            }
        }

        function renderSessions() {
            const container = document.getElementById('sessions-list');
            container.innerHTML = sessions.map(session => `
                <div class="session-item ${currentSession?.id === session.id ? 'active' : ''}" onclick="selectSession('${session.id}')">
                    <div class="session-item-icon">💬</div>
                    <div class="session-item-content">
                        <div class="session-item-title">${escapeHtml(session.name)}</div>
                        <div class="session-item-meta">${session.messages?.length || 0} 条消息</div>
                    </div>
                </div>
            `).join('');
        }

        // Messages
        function renderMessages() {
            const container = document.getElementById('messages-container');
            const emptyState = document.getElementById('empty-state');
            
            if (messages.length === 0) {
                container.innerHTML = '';
                container.appendChild(emptyState);
                emptyState.style.display = 'flex';
                return;
            }
            
            emptyState.style.display = 'none';
            container.innerHTML = messages.map(msg => createMessageHtml(msg)).join('');
            scrollToBottom();
        }

        function createMessageHtml(msg) {
            const avatar = msg.role === 'user' ? '👤' : msg.role === 'assistant' ? '🤖' : '⚠️';
            const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('zh-CN') : '';
            
            return `
                <div class="message ${msg.role}">
                    <div class="message-avatar">${avatar}</div>
                    <div class="message-content">
                        <div class="message-bubble">${formatContent(msg.content)}</div>
                        <div class="message-meta">
                            <span>${time}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function formatContent(content) {
            // Basic markdown-like formatting
            let formatted = escapeHtml(content);
            
            // Code blocks
            formatted = formatted.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            
            // Inline code
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Bold
            formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // Line breaks
            formatted = formatted.replace(/\n/g, '<br>');
            
            return formatted;
        }

        function appendMessage(role, content, timestamp = null) {
            const msg = {
                role,
                content,
                timestamp: timestamp || new Date().toISOString()
            };
            messages.push(msg);
            
            const container = document.getElementById('messages-container');
            const emptyState = document.getElementById('empty-state');
            emptyState.style.display = 'none';
            
            container.insertAdjacentHTML('beforeend', createMessageHtml(msg));
            scrollToBottom();
        }

        // Sending Messages
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            
            if (!content || isStreaming) return;
            
            const provider = document.getElementById('provider-select').value;
            const stream = document.getElementById('stream-toggle').checked;

            // Create session if needed
            if (!currentSession) {
                await createNewSession();
            }

            // Add user message
            appendMessage('user', content);
            input.value = '';
            autoResize(input);

            // Show typing indicator
            showTypingIndicator();

            // Prepare messages for API
            const apiMessages = [
                { role: 'system', content: '你是 OpenMan，一个有帮助的 AI 助手。请用中文回答问题，保持友好和专业的态度。' },
                ...messages.filter(m => m.role !== 'system').map(m => ({
                    role: m.role,
                    content: m.content
                }))
            ];

            try {
                if (stream && ws && ws.readyState === WebSocket.OPEN) {
                    // Use WebSocket for streaming
                    isStreaming = true;
                    updateSendButton();
                    
                    ws.send(JSON.stringify({
                        type: 'chat',
                        payload: {
                            messages: apiMessages,
                            provider: provider,
                            stream: true
                        }
                    }));
                } else {
                    // Use REST API
                    const response = await fetch(`${API_BASE}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: apiMessages,
                            provider: provider,
                            stream: false
                        })
                    });

                    hideTypingIndicator();

                    if (response.ok) {
                        const data = await response.json();
                        appendMessage('assistant', data.content);
                        saveMessageToSession('assistant', data.content);
                    } else {
                        const error = await response.json();
                        showError(error.error || '请求失败');
                    }
                }
            } catch (error) {
                hideTypingIndicator();
                showError('网络错误: ' + error.message);
            }
        }

        function sendQuickMessage(text) {
            document.getElementById('message-input').value = text;
            sendMessage();
        }

        // Streaming
        function appendStreamToken(token) {
            hideTypingIndicator();
            
            const container = document.getElementById('messages-container');
            let lastMessage = container.querySelector('.message.assistant:last-child .message-bubble');
            
            if (!lastMessage || !lastMessage.classList.contains('streaming')) {
                appendMessage('assistant', '');
                lastMessage = container.querySelector('.message.assistant:last-child .message-bubble');
                lastMessage.classList.add('streaming');
            }
            
            lastMessage.innerHTML = formatContent(lastMessage.textContent + token);
            scrollToBottom();
        }

        function completeStream(response) {
            isStreaming = false;
            updateSendButton();
            
            const container = document.getElementById('messages-container');
            const lastBubble = container.querySelector('.message.assistant:last-child .message-bubble');
            
            if (lastBubble) {
                lastBubble.classList.remove('streaming');
                // Update with final content
                if (response && response.content) {
                    lastBubble.innerHTML = formatContent(response.content);
                    // Update messages array
                    if (messages.length > 0 && messages[messages.length - 1].role === 'assistant') {
                        messages[messages.length - 1].content = response.content;
                    } else {
                        messages.push({ role: 'assistant', content: response.content, timestamp: new Date().toISOString() });
                    }
                    saveMessageToSession('assistant', response.content);
                }
            }
        }

        function updateSendButton() {
            const btn = document.getElementById('send-btn');
            btn.disabled = isStreaming;
            btn.textContent = isStreaming ? '发送中...' : '发送 ➤';
        }

        // UI Helpers
        function showTypingIndicator() {
            const container = document.getElementById('messages-container');
            const indicator = document.createElement('div');
            indicator.id = 'typing-indicator';
            indicator.className = 'message assistant';
            indicator.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        <div class="typing-indicator">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(indicator);
            scrollToBottom();
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function showError(message) {
            hideTypingIndicator();
            isStreaming = false;
            updateSendButton();
            
            const container = document.getElementById('messages-container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = '❌ ' + message;
            container.appendChild(errorDiv);
            scrollToBottom();
        }

        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        // Keyboard Shortcuts
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Session Operations
        async function saveMessageToSession(role, content) {
            if (!currentSession) return;
            
            try {
                await fetch(`${API_BASE}/api/sessions/${currentSession.id}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, content })
                });
            } catch (error) {
                console.error('Failed to save message:', error);
            }
        }

        async function clearCurrentSession() {
            if (!currentSession) return;
            
            if (!confirm('确定要清空当前对话吗？')) return;
            
            messages = [];
            renderMessages();
            showToast('对话已清空', 'success');
        }

        async function exportCurrentSession() {
            if (!currentSession || messages.length === 0) {
                showToast('没有内容可导出', 'error');
                return;
            }
            
            let content = `# ${currentSession.name}\n\n`;
            content += `导出时间: ${new Date().toLocaleString('zh-CN')}\n\n---\n\n`;
            
            messages.forEach(msg => {
                const role = msg.role === 'user' ? '👤 用户' : msg.role === 'assistant' ? '🤖 AI' : '系统';
                content += `### ${role}\n\n${msg.content}\n\n`;
            });
            
            // Download as file
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentSession.name}.md`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('导出成功', 'success');
        }

        // Utility Functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
